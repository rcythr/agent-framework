apiVersion: v1
kind: Secret
metadata:
  name: llm-creds
  namespace: pi-agents
type: Opaque
stringData:
  api-key: "placeholder"   # override via cluster-up.sh using OPENAI_API_KEY env var
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-creds
  namespace: pi-agents
type: Opaque
data:
  cookie-secret: ""   # base64-encoded 32-byte random secret; generate with: openssl rand -base64 32 | tr -d '\n' | base64
  client-id: ""       # base64-encoded GitLab application ID
  client-secret: ""   # base64-encoded GitLab application secret
