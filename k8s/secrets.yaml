apiVersion: v1
kind: Secret
metadata:
  name: llm-creds
  namespace: pi-agents
type: Opaque
stringData:
  api-key: "placeholder"   # override via cluster-up.sh using OPENAI_API_KEY env var
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-creds
  namespace: pi-agents
type: Opaque
data:
  cookie-secret: ""   # base64-encoded 32-byte random secret; generate with: openssl rand -base64 32 | tr -d '\n' | base64
  client-id: ""       # base64-encoded OAuth application ID
  client-secret: ""   # base64-encoded OAuth application secret
---
apiVersion: v1
kind: Secret
metadata:
  name: github-creds
  namespace: pi-agents
type: Opaque
stringData:
  token: "placeholder"          # GitHub personal access token or app installation token
  webhook-secret: "placeholder" # GitHub webhook secret
---
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-creds
  namespace: pi-agents
type: Opaque
stringData:
  username: "placeholder"       # Bitbucket account username
  app-password: "placeholder"   # Bitbucket app password with repo read/write permissions
  webhook-secret: "placeholder" # Bitbucket webhook secret
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-creds
  namespace: pi-agents
type: Opaque
stringData:
  token: "placeholder"          # Gitea access token
  webhook-secret: "placeholder" # Gitea webhook secret
