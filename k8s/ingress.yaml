# Ingress for paths that bypass oauth2-proxy (webhook and internal endpoints)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phalanx-bypass
  namespace: pi-agents
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: phalanx.localhost
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: pi-agent-gateway
                port:
                  number: 80
          - path: /internal/
            pathType: Prefix
            backend:
              service:
                name: pi-agent-gateway
                port:
                  number: 80
---
# Ingress for all other paths — routed through oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phalanx
  namespace: pi-agents
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: phalanx.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oauth2-proxy
                port:
                  number: 80
