apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phalanx
  namespace: pi-agents
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: nginx
  rules:
    - host: phalanx.localhost
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: pi-agent-gateway
                port:
                  number: 80
