{{- if .Values.ingress.enabled }}
# Bypass ingress — webhook and internal endpoints skip oauth2-proxy
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phalanx-bypass
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: pi-agent-gateway
                port:
                  number: 80
          - path: /internal/
            pathType: Prefix
            backend:
              service:
                name: pi-agent-gateway
                port:
                  number: 80
---
# Main ingress — all other traffic routed through oauth2-proxy (or direct to gateway)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: phalanx
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                {{- if .Values.oauth2proxy.enabled }}
                name: oauth2-proxy
                {{- else }}
                name: pi-agent-gateway
                {{- end }}
                port:
                  number: 80
{{- end }}
