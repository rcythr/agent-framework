---
apiVersion: v1
kind: Secret
metadata:
  name: llm-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  api-key: {{ .Values.llm.apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.gitlab.token | quote }}
  webhook-secret: {{ .Values.gitlab.webhookSecret | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: github-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.github.token | default "placeholder" | quote }}
  webhook-secret: {{ .Values.github.webhookSecret | default "placeholder" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: bitbucket-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.bitbucket.username | default "placeholder" | quote }}
  app-password: {{ .Values.bitbucket.appPassword | default "placeholder" | quote }}
  webhook-secret: {{ .Values.bitbucket.webhookSecret | default "placeholder" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.gitea.token | default "placeholder" | quote }}
  webhook-secret: {{ .Values.gitea.webhookSecret | default "placeholder" | quote }}
{{- if .Values.oauth2proxy.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-creds
  namespace: {{ include "phalanx.namespace" . }}
  labels:
    {{- include "phalanx.labels" . | nindent 4 }}
type: Opaque
stringData:
  cookie-secret: {{ .Values.oauth2proxy.cookieSecret | quote }}
  client-id: {{ .Values.oauth2proxy.clientId | quote }}
  client-secret: {{ .Values.oauth2proxy.clientSecret | quote }}
{{- end }}
